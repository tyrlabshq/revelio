app = 'revelio-api'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '8430'
  CORS_ORIGINS = 'https://revelio.app,https://www.revelio.app,capacitor://localhost,ionic://localhost'

[http_service]
  internal_port = 8430
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "revelio_data"
  destination = "/data"

# PostgreSQL database (created separately via `fly postgres create`)
# Then attach with: fly postgres attach --app revelio-api revelio-db